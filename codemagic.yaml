# ============================================================
# CC Hub〽️ — Codemagic Cloud Build Config
# Builds Android AAB + iOS IPA automatically
# Sign up free at: codemagic.io
# ============================================================

workflows:

  # ── ANDROID ────────────────────────────────────────────────
  android-release:
    name: Android Release (Play Store)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      android_signing:
        - keystore_reference  # Add in Codemagic UI → Code Signing
      groups:
        - cc_hub_env_vars     # Add env vars in Codemagic UI
      node: 20.x
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build Android AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal       # Start with internal testing
        submit_as_draft: true
      email:
        recipients:
          - austinfagbohun@gmail.com
        notify:
          success: true
          failure: true

  # ── iOS ─────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cruiseconnect.hub
      groups:
        - cc_hub_env_vars
      node: 20.x
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set version
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "com.cruiseconnect.hub")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false  # Set true when ready for production
      email:
        recipients:
          - austinfagbohun@gmail.com
        notify:
          success: true
          failure: true

  # ── QUICK ANDROID DEBUG (test builds) ──────────────────────
  android-debug:
    name: Android Debug APK (for testing)
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      node: 20.x
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - austinfagbohun@gmail.com
        notify:
          success: true
          failure: false
