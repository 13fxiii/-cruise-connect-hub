name: Desktop Build (Windows · Mac · Linux)

on:
  push:
    tags:
      - 'v*'        # triggers on: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # manual trigger from GitHub Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: Windows
          - os: macos-latest
            platform: macOS
          - os: ubuntu-latest
            platform: Linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-hub-${{ matrix.platform }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.snap
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          body: |
            ## Cruise Connect Hub ${{ github.ref_name }}
            
            Download for your platform:
            - 🪟 **Windows**: `.exe` installer
            - 🍎 **macOS**: `.dmg` file  
            - 🐧 **Linux**: `.AppImage` or `.deb`
            
            Or use the web app: https://cruise-connect-hub.netlify.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
